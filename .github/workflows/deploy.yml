name: Deploy KMS Portal

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.databiz.app

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=workwear-kms-portal --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
